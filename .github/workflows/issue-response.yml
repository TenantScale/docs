name: Issue Response

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.get({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            // Check if this is the author's first issue
            const { data: allIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: issue.user.login,
              per_page: 2,
            });

            const isFirstIssue = allIssues.length === 1;

            const message = isFirstIssue
              ? `👋 Thanks for opening your first issue in the **TenantScale Docs**! We appreciate your help in making multi-tenant B2B SaaS documentation better for everyone.\n\nPlease check our [Contributing Guide](https://github.com/TenantScale/docs/blob/main/CONTRIBUTING.md). A maintainer will review this shortly.`
              : `👋 Thanks for opening this issue! A maintainer will review it shortly.\n\nIn the meantime, feel free to check our [Contributing Guide](https://github.com/TenantScale/docs/blob/main/CONTRIBUTING.md) if you'd like to help.`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message,
            });

            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['triage'],
            });

            await github.rest.issues.addAssignees({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              assignees: ['ThatDevMat'],
            });
